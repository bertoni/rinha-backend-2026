version: '3.5'
services:
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - faiss1
      - faiss2
    ports:
      - "9999:9999"
    ulimits:
      nproc: 1000000
      nofile:
        soft: 1000000
        hard: 1000000
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: '30MB'
        reservations:
          cpus: '0.1'
          memory: '30MB'
    networks:
      - rinha

  faiss1: &faiss
    build:
      context: ./python/
    image: fraud-faiss-api
    platform: linux/x86_64
    hostname: faiss1
    restart: always
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ready"]
      interval: 10s
      timeout: 30s
      retries: 3
      start_period: 60s
    ulimits:
      nproc: 1000000
      nofile:
        soft: 1000000
        hard: 1000000
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: '160MB'
        reservations:
          cpus: '0.45'
          memory: '160MB'
    networks:
      - rinha

  faiss2:
    <<: *faiss
    hostname: faiss2
    ports:
      - "8082:8080"

networks:
  rinha:
    driver: bridge